kind: Eval
metadata:
  name: "openai-agent-kubernetes-test"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.4
  llmJudge:
    env:
      baseUrlKey: JUDGE_BASE_URL
      apiKeyKey: JUDGE_API_KEY
      modelNameKey: JUDGE_MODEL_NAME
  taskSets:
    # Kubernetes tasks
    - glob: ../tasks/*/*/*.yaml
      labelSelector:
        suite: kubernetes
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    - glob: ../tasks/config/*/*.yaml
      labelSelector:
        suite: config
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "configuration_.*"
        minToolCalls: 1
        maxToolCalls: 10
    - glob: ../tasks/helm/*/*.yaml
      labelSelector:
        suite: helm
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "helm_.*"
        minToolCalls: 1
        maxToolCalls: 10
    # KubeVirt tasks
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        suite: kubevirt
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        expected-tool: vm_create
      assertions:
        toolsUsed:
          - server: kubernetes
            tool: vm_create
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        expected-tool: vm_clone
      assertions:
        toolsUsed:
          - server: kubernetes
            tool: vm_clone
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        expected-tool: vm_lifecycle
      assertions:
        toolsUsed:
          - server: kubernetes
            tool: vm_lifecycle
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        expected-tool: resources_delete
      assertions:
        toolsUsed:
          - server: kubernetes
            tool: resources_delete
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        expected-tool: resources_create_or_update
      assertions:
        toolsUsed:
          - server: kubernetes
            tool: resources_create_or_update
    - path: ../tasks/kubevirt/troubleshoot-vm/task.yaml
      assertions:
        promptsUsed:
          - server: kubernetes
            prompt: vm-troubleshoot
    # Kiali tasks
    - glob: ../tasks/*/*/*.yaml
      labelSelector:
        suite: kiali
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 40
    # Tekton tasks
    - glob: ../tasks/tekton/*/*.yaml
      labelSelector:
        suite: tekton
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
