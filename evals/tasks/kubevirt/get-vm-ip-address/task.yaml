kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kubevirt
    requires: kubevirt
  name: "get-vm-ip-address"
  difficulty: easy
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-ip-address
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-ip-address
    - k8s.create:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: test-vm
          namespace: vm-test-ip-address
        spec:
          runStrategy: Always
          template:
            spec:
              domain:
                devices:
                  disks:
                  - name: containerdisk
                    disk:
                      bus: virtio
                  - name: cloudinitdisk
                    disk:
                      bus: virtio
                resources:
                  requests:
                    memory: 2Gi
              volumes:
              - name: containerdisk
                containerDisk:
                  image: quay.io/containerdisks/fedora:latest
              - name: cloudinitdisk
                cloudInitNoCloud:
                  userData: |
                    #cloud-config
                    password: fedora
                    chpasswd: { expire: False }
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl wait --for=create vm/test-vm -n vm-test-ip-address --timeout=30s
          kubectl wait --for=condition=Ready vm/test-vm -n vm-test-ip-address --timeout=30s
          kubectl wait --for=condition=AgentConnected --timeout=30s vmi/test-vm -n vm-test-ip-address
          echo "VM created with guest agent connected."
  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          if ! kubectl get vm test-vm -n vm-test-ip-address &>/dev/null; then
            echo "ERROR: VirtualMachine 'test-vm' not found"
            exit 1
          fi
          echo "Verification passed: VM exists"
          exit 0
  cleanup:
    - k8s.delete:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: test-vm
          namespace: vm-test-ip-address
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-ip-address
        ignoreNotFound: true
  prompt:
    inline: |
      Get the IP address of the VirtualMachine "test-vm" in the vm-test-ip-address namespace from inside the guest OS.

      Report the IP address you find.
